<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Rent In — Kenya's 1 Property Marketplace | Buy, Sell & Rent</title>
    <meta name="description" content="Find houses, apartments, land and commercial properties for sale or rent across Kenya. Browse verified listings in Nairobi, Mombasa, Kisumu and more." />
    <meta name="keywords" content="houses for sale Kenya, apartments for rent Nairobi, property Kenya, real estate Kenya, rent house Nairobi, land for sale Kenya" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://renthub.co.ke" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://renthub.co.ke" />
    <meta property="og:title" content="Rent Hub — Kenya's #1 Property Marketplace" />
    <meta property="og:description" content="Find your dream property in Kenya. Thousands of verified listings for sale and rent." />
    <meta property="og:image" content="https://renthub.co.ke/og-image.jpg" />
    <meta property="og:locale" content="en_KE" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rent Hub — Kenya's #1 Property Marketplace" />
    <meta name="twitter:description" content="Find your dream property in Kenya. Thousands of verified listings for sale and rent." />
    <meta name="twitter:image" content="https://renthub.co.ke/og-image.jpg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RealEstateAgent",
      "name": "Rent Hub",
      "description": "Kenya's leading property marketplace for buying, selling and renting properties.",
      "url": "https://renthub.co.ke",
      "areaServed": {
        "@type": "Country",
        "name": "Kenya"
      },
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "KE",
        "addressLocality": "Nairobi"
      }
    }
    </script>

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
